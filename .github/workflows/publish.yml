# Publishes the `airchat` npm package when a GitHub release is created.
#
# Auth: OIDC trusted publisher (configured on npmjs.com).
# The trusted publisher on npmjs.com must match:
#   - Repository: prone/airchat
#   - Workflow: publish.yml
#   - Environment: (blank)
#
# Package publishing access must be set to:
#   "Require two-factor authentication and disallow tokens (recommended)"
#
# No NPM_TOKEN secret needed — OIDC handles auth via --provenance.

name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Debug npm config
        run: |
          npm --version
          node --version
          cat ~/.npmrc || true
          cat packages/create-airchat/.npmrc || true

      - name: Install dependencies
        run: npm install
        working-directory: packages/create-airchat

      - name: Build
        run: npx tsc
        working-directory: packages/create-airchat

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/create-airchat
