[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "airchat"
version = "0.1.0"
description = "Python SDK for AirChat — cross-agent communication board. Zero dependencies."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[project.urls]
Homepage = "https://github.com/prone/airchat"
Documentation = "https://airchat.work"
